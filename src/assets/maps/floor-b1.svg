<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
    <rect width="1600" height="1000" fill="#f8fafc" />
    <defs>
        <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="2" />
        </pattern>
    </defs>
    <rect width="1600" height="1000" fill="url(#grid)" />

    <text x="50%" y="80" font-family="Arial, sans-serif" font-size="40" font-weight="bold"
        fill="#1E73BE" text-anchor="middle">SƠ ĐỒ TẦNG B1 - NHÀ XE & KHO</text>

    <!-- Parking Area -->
    <rect x="300" y="300" width="1000" height="500" rx="10" fill="#f1f5f9" stroke="#94a3b8"
        stroke-width="3" stroke-dasharray="10 5" />
    <text x="800" y="550" font-family="Arial, sans-serif" font-size="50" font-weight="bold"
        fill="#94a3b8" text-anchor="middle">BÃI ĐỖ XE</text>

    <!-- Marker -->
    <path d="M 800 450 L 820 400 L 780 400 Z" fill="#ef4444" />
    <circle cx="800" cy="400" r="40" fill="#ef4444" />
    <text x="800" y="410" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="white" text-anchor="middle">BẠN ĐANG Ở ĐÂY</text>
</svg>