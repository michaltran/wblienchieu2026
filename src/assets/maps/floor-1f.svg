<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
    <rect width="1600" height="1000" fill="#f8fafc" />
    <defs>
        <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="2" />
        </pattern>
    </defs>
    <rect width="1600" height="1000" fill="url(#grid)" />

    <text x="50%" y="80" font-family="Arial, sans-serif" font-size="40" font-weight="bold"
        fill="#1E73BE" text-anchor="middle">SƠ ĐỒ TẦNG 1 - KHÁM BỆNH & CẤP CỨU</text>

    <!-- Emergency -->
    <rect x="200" y="300" width="400" height="400" rx="10" fill="#fee2e2" stroke="#ef4444"
        stroke-width="3" />
    <text x="400" y="500" font-family="Arial, sans-serif" font-size="40" font-weight="bold"
        fill="#ef4444" text-anchor="middle">CẤP CỨU</text>

    <!-- Setup -->
    <rect x="650" y="300" width="700" height="400" rx="10" fill="#ecfccb" stroke="#84cc16"
        stroke-width="3" />
    <text x="1000" y="500" font-family="Arial, sans-serif" font-size="40" font-weight="bold"
        fill="#65a30d" text-anchor="middle">KHOA KHÁM BỆNH ĐA KHOA</text>

    <!-- Marker -->
    <circle cx="1000" cy="400" r="40" fill="#1E73BE" />
    <text x="1000" y="410" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="white" text-anchor="middle">BẠN ĐANG Ở ĐÂY</text>
</svg>