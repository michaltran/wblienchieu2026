<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
    <rect width="1600" height="1000" fill="#f8fafc" />
    <rect width="1600" height="1000" fill="url(#grid)" />
    <defs>
        <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="2" />
        </pattern>
    </defs>

    <text x="50%" y="80" font-family="Arial, sans-serif" font-size="40" font-weight="bold"
        fill="#1E73BE" text-anchor="middle">SƠ ĐỒ TẦNG 2 - NỘI TRÚ & XÉT NGHIỆM</text>

    <rect x="300" y="300" width="400" height="400" rx="10" fill="#e0f2fe" stroke="#3b82f6"
        stroke-width="3" />
    <text x="500" y="500" font-family="Arial, sans-serif" font-size="40" font-weight="bold"
        fill="#3b82f6" text-anchor="middle">NỘI TRÚ</text>

    <rect x="750" y="300" width="500" height="400" rx="10" fill="#f3e8ff" stroke="#a855f7"
        stroke-width="3" />
    <text x="1000" y="500" font-family="Arial, sans-serif" font-size="40" font-weight="bold"
        fill="#a855f7" text-anchor="middle">XÉT NGHIỆM</text>
</svg>