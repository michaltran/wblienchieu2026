<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
    <rect width="1600" height="1000" fill="#f8fafc" />
    <defs>
        <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="2" />
        </pattern>
    </defs>
    <rect width="1600" height="1000" fill="url(#grid)" />

    <text x="50%" y="80" font-family="Arial, sans-serif" font-size="40" font-weight="bold"
        fill="#1E73BE" text-anchor="middle">SƠ ĐỒ TỔNG THỂ BỆNH VIỆN</text>

    <!-- Main Building Block -->
    <rect x="400" y="300" width="800" height="400" rx="20" fill="#fff" stroke="#1E73BE"
        stroke-width="4" />
    <rect x="420" y="320" width="760" height="360" rx="10" fill="#eff6ff" />

    <text x="800" y="500" font-family="Arial, sans-serif" font-size="60" font-weight="bold"
        fill="#1e293b" text-anchor="middle">KHU ĐIỀU TRỊ TRUNG TÂM</text>
    <text x="800" y="550" font-family="Arial, sans-serif" font-size="30" fill="#64748b"
        text-anchor="middle">Chính</text>

    <!-- Legend Box -->
    <rect x="1250" y="750" width="300" height="200" rx="10" fill="white" stroke="#cbd5e1"
        stroke-width="2" />
    <text x="1400" y="790" font-family="Arial, sans-serif" font-size="24" font-weight="bold"
        fill="#334155" text-anchor="middle">CHÚ THÍCH</text>

    <circle cx="1300" cy="830" r="10" fill="#1E73BE" />
    <text x="1330" y="838" font-family="Arial, sans-serif" font-size="20" fill="#475569">Khu vực
        chính</text>

    <circle cx="1300" cy="870" r="10" fill="#e2e8f0" stroke="#94a3b8" />
    <text x="1330" y="878" font-family="Arial, sans-serif" font-size="20" fill="#475569">Khu phụ trợ</text>
</svg>